# Data Source Registry — 45 Fully Public Healthcare Data Sources
# Grouped by category. Each source defines acquisition parameters.
#
# Fields:
#   name: Human-readable name
#   short_name: Used in file paths and table names
#   publisher: Data publisher (CMS, FDA, Census, etc.)
#   url: Download URL (NEEDS VERIFICATION for most sources)
#   format: Source file format (csv, zip, xlsx, etc.)
#   update_frequency: How often source is updated
#   lag_months: Typical delay from data period to publication
#   tier: 1 (MVP core) or 2 (expansion)
#   volume: Approximate rows per year/snapshot
#   primary_key: Natural key columns
#   schedule: Cron expression for automated acquisition
#   file_size: Expected size range for validation
#   row_count: Expected row count range for validation

# =============================================================================
# PROVIDER IDENTITY (4 sources)
# =============================================================================
provider_identity:
  nppes:
    name: "National Plan & Provider Enumeration System"
    short_name: nppes
    publisher: CMS
    url: "https://download.cms.gov/nppes/NPI_Files.html"
    format: csv_zip
    update_frequency: monthly
    lag_months: 0
    tier: 1
    volume: 8_000_000
    primary_key: [NPI]
    schedule: "0 2 8 * *"  # 8th of every month
    file_size:
      min_gb: 1.5
      max_gb: 4.0
    row_count:
      min: 7_000_000
      max: 10_000_000
      severity: BLOCK

  pos_facilities:
    name: "Provider of Services - Current Files"
    short_name: pos
    publisher: CMS
    url: "https://data.cms.gov/provider-characteristics/hospitals-and-other-facilities/provider-of-services-file-hospital-non-hospital-facilities"
    format: csv
    update_frequency: quarterly
    lag_months: 3
    tier: 1
    volume: 300_000
    primary_key: [PRVDR_NUM]
    schedule: "0 2 15 1,4,7,10 *"  # Quarterly

  pecos_enrollment:
    name: "Provider Enrollment, Chain, and Ownership System"
    short_name: pecos
    publisher: CMS
    url: "https://data.cms.gov/provider-characteristics/medicare-provider-supplier-enrollment/medicare-fee-for-service-public-provider-enrollment"
    format: csv
    update_frequency: monthly
    lag_months: 1
    tier: 2
    volume: 2_000_000
    primary_key: [NPI]
    schedule: "0 2 10 * *"

  ordering_referring:
    name: "Ordering and Referring Physicians"
    short_name: ordering_referring
    publisher: CMS
    url: "https://data.cms.gov/provider-characteristics/medicare-provider-supplier-enrollment/order-and-referring"
    format: csv
    update_frequency: quarterly
    lag_months: 3
    tier: 2
    volume: 1_500_000
    primary_key: [NPI]
    schedule: "0 2 20 1,4,7,10 *"

