      OP_Per_Cpta_Csts:
        type: str
        required: false
        maps_to: op_per_capita_costs
      SNF_Per_Cpta_Csts:
        type: str
        required: false
        maps_to: snf_per_capita_costs
      HHA_Per_Cpta_Csts:
        type: str
        required: false
        maps_to: hha_per_capita_costs
      Hospice_Per_Cpta_Csts:
        type: str
        required: false
        maps_to: hospice_per_capita_costs
      PrtB_Per_Cpta_Csts:
        type: str
        required: false
        maps_to: partb_per_capita_costs
      PrtD_Per_Cpta_Csts:
        type: str
        required: false
        maps_to: partd_per_capita_costs
      DME_Per_Cpta_Csts:
