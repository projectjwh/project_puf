# Data Contract: Medicare Geographic Variation
# Source: CMS Medicare Geographic Variation
# Publisher: CMS
source: geovar
version: "2024.1"
grain: [bene_geo_lvl, state_fips, county_fips, data_year]

schemas:
  default:
